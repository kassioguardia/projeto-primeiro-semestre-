<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="site/imagens/logp.png">
    <title>Hikari to kage, ninja no monogatar</title>
    <link rel="stylesheet" href="site/css/style-cadastro.css">
</head>

<body>

    <header>
        <div class="logo">
                <a href="index.html">
            <img src="site/imagens/logp.png" alt="logo do jogo">
            </a>

             <button class="menu-toggle" onclick="toggleMenu()">☰</button>

             <a href="index.html" class="logo-link">
                    <span class="logo-text">hikari to kage</span>
                </a>
        </div>
        <nav class="nav">
        <ul class="lista-do-nav">
        <li><a href="index.html">inicio</a></li>
        <li><a href="sobre.html">sobre</a></li>
        <li><a href="index.html#contatos">contatos</a></li>
        <li><a href="cadastro.html">cadastre-se</a></li>
    </ul>
</nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>Cadastro</h2>

            <form>
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" required>
                </div>

                <div class="input-group">
                    <label>Confirmar Senha</label>
                    <input type="password" required>
                </div>

                <button class="btn">Cadastrar</button>
            </form>

            <div class="footer-text">
                Já tem conta? <a href="login.html">Entrar</a>
            </div>
        </div>
    </div>
<script>
function toggleMenu() {
    const menu = document.querySelector(".lista-do-nav");
    menu.classList.toggle("ativar");
}
</script>
</body>
</html>
