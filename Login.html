<!DOCTYPE html>
<html lang="pt_BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Hikari to Kage</title>
  <link rel="icon" href="site/imagens/logp.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="site/css/style-login.css">
</head>

<body>

  <div class="navbar">
    <div class="logo">
      <a href="index.html">
      <img src="site/imagens/logp.png" alt="logo do jogo">
      </a> 
      <a href="index.html" class="logo-link">
      <span class="logo-text">hikari to kage</span>
      </a>
    </div>

    <div class="menu">
      <a href="index.html">inicio</a>
      <a href="#">sobre</a>
      <a href="index.html#contatos">contatos</a>
      <a href="cadastro.html">cadastra-se</a>
    </div>
  </div>

  <div class="hero">
    <div class="login-box">
      <h2>Login</h2>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Digite um email válido">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">
      </div>

      <button class="btn" onclick="login()">Entrar</button>

      <div class="esqueceu-a-senha">
      <a href="cadastro.html" class="cadastro">Cadastrar-se</a>
       </div>
      <div class="error" id="erro"></div>
    </div>
  </div>

  <script>
    function login() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;
      const erro = document.getElementById("erro");

      erro.textContent = "";

      if (!email || !senha) {
        erro.textContent = "Preencha todos os campos!";
        return;
      }

      if (email === "kassio@gmail.com" && senha === "123") {
        window.location.href = "jogo.html";
      } else {
        erro.textContent = "Email ou senha incorretos!";
      }
    }
  </script>

</body>
</html>
